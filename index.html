<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ AI 智能图像识别</title>
    <!-- 引入 Google Fonts 提升字体美感 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* --- 全局重置与字体 --- */
        :root {
            --primary: #6366f1; /* 紫色主色调 */
            --primary-hover: #4f46e5;
            --secondary: #f43f5e; /* 粉红强调色 */
            --text: #111827;
            --text-muted: #6b7280;
            --bg: #f9fafb;
            --card-bg: rgba(255, 255, 255, 0.8);
            --border: #e5e7eb;
            --success: #10b981;
            --shadow: 0 10px 25px -12px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); /* 柔和背景渐变 */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text);
            line-height: 1.6;
        }

        /* --- 主容器 --- */
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(10px); /* 毛玻璃效果 */
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-weight: 400;
        }

        /* --- 上传区域 --- */
        .upload-area {
            border: 2px dashed var(--primary);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #f3f4f6;
        }

        .upload-area:hover {
            background-color: #e5e7eb;
            transform: translateY(-2px);
        }

        .upload-area p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .upload-btn {
            display: inline-block;
            padding: 10px 25px;
            background-color: var(--primary);
            color: white;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }

        .upload-btn:hover {
            background-color: var(--primary-hover);
        }

        /* --- 图片预览 --- */
        #preview-img {
            max-width: 100%;
            max-height: 300px;
            margin: 20px auto;
            display: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
        }

        /* --- 识别按钮 --- */
        #analyze-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 20px 0;
        }

        #analyze-btn:hover:not(:disabled) {
            transform: scale(1.02);
        }

        #analyze-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        /* --- 结果展示区 --- */
        .result-box {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #eee;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .result-item {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .label {
            font-weight: 700;
            color: var(--primary);
            display: block;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .tag {
            background: #eef2ff;
            color: var(--primary);
            padding: 5px 10px;
            border-radius: 20px;
            margin-right: 8px;
            font-size: 0.9rem;
            border: 1px solid #c7d2fe;
        }

        .loading {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            padding: 20px;
        }

        /* --- 响应式设计 --- */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
                border-radius: 12px;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI Vision Pro</h1>
        <span style="background: linear-gradient(90deg, #6366f1, #4f46e5); color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem;">
        雷嘉燚 - 202335020622
    </span>
        <p class="subtitle">上传图片，让人工智能为你解读世界</p>

        <!-- 上传区域 -->
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <p>🖼️ 点击或拖拽图片到此处</p>
            <p style="font-size: 0.9rem; color: #6b7280;">支持 JPG, PNG, WEBP 格式</p>
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            <div class="upload-btn">📂 选择文件</div>
        </div>

        <!-- 图片预览 -->
        <img id="preview-img" alt="预览">

        <!-- 识别按钮 -->
        <button id="analyze-btn">🚀 开始智能识别</button>

        <!-- 结果展示区 -->
        <div id="result-area" class="result-box" style="display: none;"></div>
    </div>

    <script>
        // --- JS 逻辑部分 (保持不变，仅修复了关键点) ---
        const fileInput = document.getElementById('file-input');
        const previewImg = document.getElementById('preview-img');
        const analyzeBtn = document.getElementById('analyze-btn');
        const resultArea = document.getElementById('result-area');

        let currentBase64 = null;

        // 1. 监听文件选择
        fileInput.addEventListener('change', function(e) {
            // ✅ 【关键修正】：必须取 files[0]，因为 files 是一个列表
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // 显示预览
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    // 保存 Base64 数据供发送
                    currentBase64 = e.target.result;

                    // 重置结果区
                    resultArea.style.display = 'none';
                    resultArea.innerHTML = '';
                }
                // 读取文件
                reader.readAsDataURL(file);
            }
        });

        // 2. 监听点击识别
        analyzeBtn.addEventListener('click', async function() {
            console.log("当前图片 Base64 数据:", currentBase64);
            if (!currentBase64) {
                alert('❌ 请先选择一张图片！');
                return;
            }

            // 界面状态：加载中
            analyzeBtn.disabled = true;
            analyzeBtn.innerText = '⏳ 正在分析中...';
            resultArea.style.display = 'block';
            resultArea.innerHTML = '<div class="loading">🧠 AI 正在努力思考中，请稍候...</div>';

            try {
                // 发送请求给 Python 后端
                const response = await fetch('http://127.0.0.1:5000/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        image: currentBase64
                    })
                });

                const data = await response.json();

                // 渲染结果
                let htmlContent = '';

                // 显示物体
                if (data.objects && data.objects.length > 0) {
                    htmlContent += '<div class="result-item"><span class="label">🔍 识别到的物体：</span>';
                    data.objects.forEach(obj => {
                        // 百度API的字段名通常是 keyword 和 score
                        htmlContent += `<span class="tag">${obj.keyword} (${(obj.score * 100).toFixed(1)}%)</span>`;
                    });
                    htmlContent += '</div>';
                }

                // 显示文字
                if (data.texts && data.texts.length > 0) {
                    htmlContent += '<div class="result-item"><span class="label">📝 识别到的文字：</span><br>';
                    data.texts.forEach(txt => {
                        htmlContent += `<div style="margin-top:5px; padding: 5px; background: #f8fafc; border-radius: 6px;">${txt.words}</div>`;
                    });
                    htmlContent += '</div>';
                }

                resultArea.innerHTML = htmlContent;

            } catch (error) {
                resultArea.innerHTML = '<p style="color: #dc2626; text-align: center;">❌ 连接服务器失败，请检查后端是否启动或查看控制台报错！</p>';
                console.error(error); // 在控制台打印具体错误
            } finally {
                // 恢复按钮状态
                analyzeBtn.disabled = false;
                analyzeBtn.innerText = '🚀 开始智能识别';
            }
        });
    </script>
</body>
</html>
